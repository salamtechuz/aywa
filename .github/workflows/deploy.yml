name: Deploy to VPS

# Two environments on ONE server, isolated Docker stacks:
#   push to dev  → DEV  stack  → http://167.233.39.254:8081  (dir /opt/erp-mini-dev)
#   push to main → PROD stack  → http://167.233.39.254       (dir /opt/erp-mini)
# A `typecheck` job gates BOTH deploys: if `tsc` fails, nothing is deployed and
# the currently-running container keeps serving.
on:
  push:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  typecheck:
    name: Type check (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Type check
        run: npx tsc --noEmit

  deploy-dev:
    name: Deploy DEV (:8081)
    needs: typecheck
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    steps:
      - name: Deploy DEV over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 167.233.39.254
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            export STACK=erp-mini-dev HTTP_PORT=8081
            cd /opt/erp-mini-dev
            echo "→ Pulling latest dev"
            git fetch --prune origin dev
            git reset --hard origin/dev
            sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma
            echo "→ Building & starting DEV stack ($STACK) on :$HTTP_PORT"
            docker compose -p "$STACK" -f docker-compose.prod.yml up -d --build
            docker image prune -f
            for i in $(seq 1 10); do
              if curl -fsS -o /dev/null "http://localhost:${HTTP_PORT}/"; then echo "✓ DEV responding"; break; fi
              echo "waiting for dev app... ($i)"; sleep 3
            done

  deploy-prod:
    name: Deploy PROD (:80)
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Deploy PROD over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 167.233.39.254
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            export STACK=erp-mini HTTP_PORT=80
            cd /opt/erp-mini
            echo "→ Pulling latest main"
            git fetch --prune origin main
            git reset --hard origin/main
            sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma
            echo "→ Building & starting PROD stack ($STACK) on :$HTTP_PORT"
            docker compose -p "$STACK" -f docker-compose.prod.yml up -d --build
            docker image prune -f
            for i in $(seq 1 10); do
              if curl -fsS -o /dev/null "http://localhost:${HTTP_PORT}/"; then echo "✓ PROD responding"; break; fi
              echo "waiting for prod app... ($i)"; sleep 3
            done

# Stack for a single VPS: Postgres + Next.js app + Caddy reverse proxy.
# Used for BOTH environments on the same server, isolated by project name:
#   PROD:  STACK=erp-mini     HTTP_PORT=80    docker compose -p erp-mini     ... (dir /opt/erp-mini,     branch main)
#   DEV:   STACK=erp-mini-dev HTTP_PORT=8081  docker compose -p erp-mini-dev ... (dir /opt/erp-mini-dev, branch dev)
# Volumes/networks are auto-prefixed by the project name, so the two stacks
# never share data. Secrets/config come from a sibling .env file (NOT committed).

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${STACK:-erp-mini}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: erp_mini
    volumes:
      - erp-mini-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_mini"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${STACK:-erp-mini}-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://erp:${POSTGRES_PASSWORD}@postgres:5432/erp_mini"
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
      # Optional integrations — empty by default, set them in .env to enable.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      CRON_SECRET: ${CRON_SECRET:-}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
    volumes:
      # Persist uploaded files across redeploys (local filesystem storage).
      - erp-mini-uploads:/app/public/uploads
    # Sync the schema to Postgres on every boot (idempotent), then serve.
    command: >
      sh -c "node_modules/.bin/prisma migrate deploy
      && node_modules/.bin/next start -H 0.0.0.0 -p 3000"

  caddy:
    image: caddy:2-alpine
    container_name: ${STACK:-erp-mini}-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      # Published HTTP port: 80 for prod, 8081 for dev (set via HTTP_PORT).
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  erp-mini-pg:
  erp-mini-uploads:
  caddy-data:
  caddy-config:

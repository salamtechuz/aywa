services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-mini-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp_mini
    ports:
      - "5432:5432"
    volumes:
      - erp-mini-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_mini"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  erp-mini-pg:
